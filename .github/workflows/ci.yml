name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - run: pip install ruff
      - name: Ruff check
        run: |
          for dir in lol-pipeline-*/; do
            if [ -f "$dir/pyproject.toml" ]; then
              echo "=== $dir ===" && (cd "$dir" && ruff check . && ruff format --check .)
            fi
          done

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e "lol-pipeline-common/[dev]"
          for dir in lol-pipeline-*/; do
            if [ -f "$dir/pyproject.toml" ]; then
              pip install -e "$dir[dev]" 2>/dev/null || pip install -e "$dir"
            fi
          done
          pip install mypy types-requests
      - name: Mypy
        run: |
          COMMON_SRC="$PWD/lol-pipeline-common/src"
          FAILED=0
          for dir in lol-pipeline-*/; do
            if [ -f "$dir/pyproject.toml" ] && [ -d "$dir/src" ]; then
              echo "=== $dir ==="
              (cd "$dir" && MYPYPATH="$COMMON_SRC" mypy src/) || FAILED=1
            fi
          done
          exit $FAILED

  test:
    name: "Unit Tests (${{ matrix.service }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - lol-pipeline-common
          - lol-pipeline-seed
          - lol-pipeline-crawler
          - lol-pipeline-fetcher
          - lol-pipeline-parser
          - lol-pipeline-recovery
          - lol-pipeline-delay-scheduler
          - lol-pipeline-analyzer
          - lol-pipeline-admin
          - lol-pipeline-discovery
          - lol-pipeline-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e "lol-pipeline-common/[dev]"
          if [ "${{ matrix.service }}" != "lol-pipeline-common" ]; then
            pip install -e "${{ matrix.service }}[dev]"
          fi
      - name: Run unit tests
        run: cd ${{ matrix.service }} && python -m pytest tests/unit -v --tb=short

  contract:
    name: "Contract Tests (${{ matrix.service }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - lol-pipeline-common
          - lol-pipeline-seed
          - lol-pipeline-crawler
          - lol-pipeline-fetcher
          - lol-pipeline-parser
          - lol-pipeline-recovery
          - lol-pipeline-delay-scheduler
          - lol-pipeline-analyzer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e "lol-pipeline-common/[dev]"
          if [ "${{ matrix.service }}" != "lol-pipeline-common" ]; then
            pip install -e "${{ matrix.service }}[dev]"
          fi
      - name: Run contract tests
        run: cd ${{ matrix.service }} && python -m pytest tests/contract -v --tb=short

  integration-tests:
    name: Integration Tests
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - name: Install all service dependencies
        run: |
          pip install -e "lol-pipeline-common/[dev]"
          for dir in lol-pipeline-*/; do
            if [ "$dir" != "lol-pipeline-common/" ] && [ -f "$dir/pyproject.toml" ]; then
              pip install -e "$dir[dev]" 2>/dev/null || pip install -e "$dir" || true
            fi
          done
          pip install testcontainers pytest-asyncio pytest-timeout
      - name: Run integration tests
        run: python3 -m pytest tests/integration/ -v --timeout=120

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit common package
        run: |
          pip install -e "lol-pipeline-common/"
          pip-audit --skip-editable
      - name: Audit all service packages
        run: |
          FAILED=0
          for dir in lol-pipeline-*/; do
            if [ -f "$dir/pyproject.toml" ]; then
              echo "=== $dir ==="
              pip install -e "$dir" 2>/dev/null || true
            fi
          done
          pip-audit --skip-editable || FAILED=1
          exit $FAILED

  docker-build:
    name: "Docker Build (${{ matrix.service }})"
    needs: [lint, typecheck, test, contract, integration-tests, security-audit]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - lol-pipeline-admin
          - lol-pipeline-analyzer
          - lol-pipeline-crawler
          - lol-pipeline-delay-scheduler
          - lol-pipeline-discovery
          - lol-pipeline-fetcher
          - lol-pipeline-parser
          - lol-pipeline-recovery
          - lol-pipeline-seed
          - lol-pipeline-ui
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          SVC_NAME="${{ matrix.service }}"
          SHORT="${SVC_NAME#lol-pipeline-}"
          MODULE="lol_${SHORT//-/_}"
          docker build -f Dockerfile.service \
            --build-arg SERVICE_NAME="$SHORT" \
            --build-arg MODULE_NAME="$MODULE" \
            -t "$SVC_NAME:ci" .
