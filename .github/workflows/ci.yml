name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff check
        run: |
          for dir in lol-pipeline-*/; do
            if [ -f "$dir/pyproject.toml" ]; then
              echo "=== $dir ===" && (cd "$dir" && ruff check src/ && ruff format --check src/)
            fi
          done

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install mypy pydantic types-requests
          pip install -e lol-pipeline-common/
      - name: Mypy
        run: |
          COMMON_SRC="$PWD/lol-pipeline-common/src"
          for dir in lol-pipeline-*/; do
            if [ -f "$dir/pyproject.toml" ] && [ -d "$dir/src" ]; then
              echo "=== $dir ===" && (cd "$dir" && MYPYPATH="$COMMON_SRC" mypy src/ || true)
            fi
          done

  test:
    name: "Unit Tests (${{ matrix.service }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - lol-pipeline-common
          - lol-pipeline-seed
          - lol-pipeline-crawler
          - lol-pipeline-fetcher
          - lol-pipeline-parser
          - lol-pipeline-recovery
          - lol-pipeline-delay-scheduler
          - lol-pipeline-analyzer
          - lol-pipeline-admin
          - lol-pipeline-discovery
          - lol-pipeline-lcu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e "lol-pipeline-common/[dev]"
          if [ "${{ matrix.service }}" != "lol-pipeline-common" ]; then
            pip install -e "${{ matrix.service }}[dev]" 2>/dev/null || pip install -e "${{ matrix.service }}" || true
          fi
      - name: Run unit tests
        run: cd ${{ matrix.service }} && python -m pytest tests/unit -v --tb=short

  contract:
    name: "Contract Tests (${{ matrix.service }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - lol-pipeline-common
          - lol-pipeline-seed
          - lol-pipeline-crawler
          - lol-pipeline-fetcher
          - lol-pipeline-parser
          - lol-pipeline-recovery
          - lol-pipeline-delay-scheduler
          - lol-pipeline-analyzer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e "lol-pipeline-common/[dev]"
          if [ "${{ matrix.service }}" != "lol-pipeline-common" ]; then
            pip install -e "${{ matrix.service }}[dev]" 2>/dev/null || pip install -e "${{ matrix.service }}" || true
          fi
      - name: Run contract tests
        run: cd ${{ matrix.service }} && python -m pytest tests/contract -v --tb=short
