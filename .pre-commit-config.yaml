# Pre-commit hooks — run before every commit.
# Install: pip install pre-commit && pre-commit install
# Manual:  pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        language: system
        entry: bash -c 'ruff check "$@"' --
        types: [python]

      - id: ruff-format
        name: ruff format
        language: system
        entry: bash -c 'ruff format "$@"' --
        types: [python]
