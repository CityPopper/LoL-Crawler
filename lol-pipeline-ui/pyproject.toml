[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lol-pipeline-ui"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "lol-pipeline-common>=1.0.0,<2.0.0",
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.29.0",
    "python-multipart>=0.0.9",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "fakeredis[aioredis]>=2.2.0",
    "respx",
    "freezegun",
    "testcontainers",
    "pytest-timeout",
    "pytest-xdist",
    "lupa",
    "pact-python>=2.0.0",
    "jsonschema>=4.0.0",
    "hypothesis>=6.0.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["src/lol_ui", "tests"]
addopts = ""
asyncio_mode = "auto"
timeout = 10

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes — undefined names, unused imports
    "I",    # isort — deterministic import ordering
    "B",    # flake8-bugbear — likely bugs and design issues
    "C90",  # McCabe cyclomatic complexity
    "UP",   # pyupgrade — enforce modern Python 3.14 idioms
    "N",    # pep8-naming — consistent naming conventions
    "S",    # flake8-bandit — security vulnerability scanning
    "ANN",  # flake8-annotations — require type annotations
    "SIM",  # flake8-simplify — reduce unnecessary verbosity
    "PLR",  # pylint refactoring — branch/statement/arg limits
    "RUF",  # ruff-native rules
]
ignore = [
    "ANN401",  # `Any` allowed in serialization/middleware boundary code
    "PLR2004", # magic values — HTTP status codes, stream lengths are idiomatic
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-branches = 12
max-statements = 50
max-args = 7
max-returns = 6

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "ANN", "SIM"]
"src/**/test_*.py" = ["S101", "ANN", "SIM"]
"src/lol_ui/strings.py" = ["RUF001", "RUF003"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
plugins = ["pydantic.mypy"]
python_version = "3.14"
strict = true
warn_return_any = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = ["fastapi.*", "uvicorn.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["lol_ui.test_strings", "lol_ui.test_css", "lol_ui.test_constants", "lol_ui.test_rendering", "lol_ui.test_ddragon", "lol_ui.test_stats_helpers", "lol_ui.test_playstyle", "lol_ui.test_tilt", "lol_ui.test_match_badges", "lol_ui.test_rank", "lol_ui.test_match_history", "lol_ui.test_dlq_helpers", "lol_ui.test_streams_helpers", "lol_ui.test_player_helpers", "lol_ui.test_resolve", "lol_ui.test_champions_helpers", "lol_ui.test_log_helpers", "lol_ui.test_tabs", "lol_ui.test_damage_bars", "lol_ui.test_team_analysis", "lol_ui.test_stats_layout", "lol_ui.test_build_display", "lol_ui.test_rune_display", "lol_ui.test_spell_display", "lol_ui.test_kill_timeline", "lol_ui.test_sparkline", "lol_ui.test_recently_played", "lol_ui.test_language", "lol_ui.test_summoner_icon", "lol_ui.test_profile_tabs", "lol_ui.test_health", "lol_ui.test_match_detail", "lol_ui.test_security_headers", "lol_ui.charts.test_win_rate_donut", "lol_ui.charts.test_gold_chart", "lol_ui.charts.test_minimap", "lol_ui.scoring.test_ai_score", "lol_ui.scoring.test_ai_insight", "lol_ui.routes.test_dashboard", "lol_ui.routes.test_stats", "lol_ui.routes.test_players", "lol_ui.routes.test_streams", "lol_ui.routes.test_dlq", "lol_ui.routes.test_champions", "lol_ui.routes.test_matchups", "lol_ui.routes.test_logs", "lol_ui.routes.test_language", "lol_ui.routes.test_health", "lol_ui.conftest", "lol_ui.routes.conftest"]
disallow_untyped_decorators = false
disallow_untyped_defs = false
disallow_untyped_calls = false
