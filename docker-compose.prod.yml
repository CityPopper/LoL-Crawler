version: "3.9"

# Production overrides — apply with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# Uses registry images instead of local builds; no volume mounts for common lib.

services:

  crawler:
    build: !reset null
    image: crawler:${GIT_SHA:-latest}
    volumes: []
    command: ["python", "-m", "lol_crawler"]

  fetcher:
    build: !reset null
    image: fetcher:${GIT_SHA:-latest}
    volumes: []
    command: ["python", "-m", "lol_fetcher"]

  parser:
    build: !reset null
    image: parser:${GIT_SHA:-latest}
    volumes: []
    command: ["python", "-m", "lol_parser"]

  analyzer:
    build: !reset null
    image: analyzer:${GIT_SHA:-latest}
    volumes: []
    command: ["python", "-m", "lol_analyzer"]

  recovery:
    build: !reset null
    image: recovery:${GIT_SHA:-latest}
    volumes: []
    command: ["python", "-m", "lol_recovery"]

  delay-scheduler:
    build: !reset null
    image: delay-scheduler:${GIT_SHA:-latest}
    volumes: []
    command: ["python", "-m", "lol_delay_scheduler"]
