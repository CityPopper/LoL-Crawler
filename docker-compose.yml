x-service-defaults: &service-defaults
  env_file: .env
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: ["ALL"]
  stop_grace_period: 30s
  mem_limit: 512m
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"
  environment:
    PIP_ROOT_USER_ACTION: ignore
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    LOG_DIR: /logs
  depends_on:
    redis:
      condition: service_healthy

# Worker services: service-defaults + Redis healthcheck
x-worker-defaults: &worker-defaults
  <<: *service-defaults
  healthcheck:
    test: ["CMD-SHELL", "python -c \"import asyncio,os,sys; from lol_pipeline.redis_client import get_redis,health_check; sys.exit(0 if asyncio.run(health_check(get_redis(os.environ.get('REDIS_URL','redis://redis:6379/0')))) else 1)\""]
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 60s

x-service-build: &service-build
  context: .
  dockerfile: Dockerfile.service

services:

  redis:
    image: redis:7.2.11-alpine  # Pinned: CVE-2025-49844 (Lua RCE) patched in 7.2.11+
    restart: always
    mem_limit: 2g  # Headroom for AOF rewrite fork (doubles memory briefly)
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 800mb
      --maxmemory-policy noeviction
      --stop-writes-on-bgsave-error no
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ${REDIS_DATA_DIR:-./redis-data}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  crawler:
    <<: *worker-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: crawler
        MODULE_NAME: lol_crawler
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-crawler:/svc
      - ./logs:/logs
    command: ["python", "-m", "lol_crawler"]

  fetcher:
    <<: *worker-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: fetcher
        MODULE_NAME: lol_fetcher
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-fetcher:/svc
      - ./lol-pipeline-fetcher/match-data:/match-data
      - ./logs:/logs
    command: ["python", "-m", "lol_fetcher"]

  parser:
    <<: *worker-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: parser
        MODULE_NAME: lol_parser
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-parser:/svc
      - ./lol-pipeline-fetcher/match-data:/match-data:ro
      - ./logs:/logs
    command: ["python", "-m", "lol_parser"]

  analyzer:
    <<: *worker-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: analyzer
        MODULE_NAME: lol_analyzer
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-analyzer:/svc
      - ./logs:/logs
    command: ["python", "-m", "lol_analyzer"]

  recovery:
    <<: *worker-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: recovery
        MODULE_NAME: lol_recovery
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-recovery:/svc
      - ./logs:/logs
    command: ["python", "-m", "lol_recovery"]

  delay-scheduler:
    <<: *worker-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: delay-scheduler
        MODULE_NAME: lol_delay_scheduler
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-delay-scheduler:/svc
      - ./logs:/logs
    command: ["python", "-m", "lol_delay_scheduler"]

  ui:
    <<: *service-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: ui
        MODULE_NAME: lol_ui
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-ui:/svc
      - ./logs:/logs
    ports:
      - "127.0.0.1:8080:8080"
    command: ["python", "-m", "lol_ui"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  discovery:
    <<: *worker-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: discovery
        MODULE_NAME: lol_discovery
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-discovery:/svc
      - ./logs:/logs
    command: ["python", "-m", "lol_discovery"]

  # One-shot tools — not started by default; use `docker compose run`
  seed:
    <<: *service-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: seed
        MODULE_NAME: lol_seed
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-seed:/svc
    profiles: ["tools"]
    restart: "no"
    user: root  # pip install at startup needs write access
    # entrypoint (not command) so `docker compose run seed <args>` passes args via $@
    entrypoint: ["sh", "-c", "pip install -q -e /common && pip install -q -e /svc && exec python -m lol_seed \"$@\"", "--"]

  admin:
    <<: *service-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: admin
        MODULE_NAME: lol_admin
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-admin:/svc
    profiles: ["tools"]
    restart: "no"
    user: root  # pip install at startup needs write access
    # entrypoint (not command) so `docker compose run admin <args>` passes args via $@
    entrypoint: ["sh", "-c", "pip install -q -e /common && pip install -q -e /svc && exec python -m lol_admin \"$@\"", "--"]

