x-service-defaults: &service-defaults
  env_file: .env
  restart: unless-stopped
  environment:
    PIP_ROOT_USER_ACTION: ignore
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    LOG_DIR: /logs
  depends_on:
    redis:
      condition: service_healthy

services:

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - ${REDIS_DATA_DIR:-./redis-data}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  crawler:
    <<: *service-defaults
    build:
      context: lol-pipeline-crawler
      args:
        COMMON_VERSION: local
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-crawler:/svc
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_crawler"

  fetcher:
    <<: *service-defaults
    build:
      context: lol-pipeline-fetcher
      args:
        COMMON_VERSION: local
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-fetcher:/svc
      - ./lol-pipeline-fetcher/match-data:/match-data
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_fetcher"

  parser:
    <<: *service-defaults
    build:
      context: lol-pipeline-parser
      args:
        COMMON_VERSION: local
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-parser:/svc
      - ./lol-pipeline-fetcher/match-data:/match-data:ro
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_parser"

  analyzer:
    <<: *service-defaults
    build:
      context: lol-pipeline-analyzer
      args:
        COMMON_VERSION: local
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-analyzer:/svc
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_analyzer"

  recovery:
    <<: *service-defaults
    build:
      context: lol-pipeline-recovery
      args:
        COMMON_VERSION: local
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-recovery:/svc
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_recovery"

  delay-scheduler:
    <<: *service-defaults
    build:
      context: lol-pipeline-delay-scheduler
      args:
        COMMON_VERSION: local
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-delay-scheduler:/svc
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_delay_scheduler"

  ui:
    <<: *service-defaults
    build:
      context: lol-pipeline-ui
      args:
        COMMON_VERSION: local
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-ui:/svc
      - ./lol-pipeline-lcu/lcu-data:/lcu-data:ro
      - ./logs:/logs
    ports:
      - "8080:8080"
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_ui"

  discovery:
    <<: *service-defaults
    build:
      context: lol-pipeline-discovery
      args:
        COMMON_VERSION: local
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-discovery:/svc
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_discovery"

  lcu:
    build:
      context: lol-pipeline-lcu
    env_file: .env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LEAGUE_INSTALL_PATH: /league-install
      LCU_HOST: host.docker.internal
      LCU_POLL_INTERVAL_MINUTES: ${LCU_POLL_INTERVAL_MINUTES:-5}
      PIP_ROOT_USER_ACTION: ignore
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      LOG_DIR: /logs
    volumes:
      - ./lol-pipeline-lcu:/svc
      - ./lol-pipeline-lcu/lcu-data:/lcu-data
      - ${LEAGUE_INSTALL_PATH:-/tmp}:/league-install:ro
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /svc && python -m lol_lcu --data-dir /lcu-data --poll-interval ${LCU_POLL_INTERVAL_MINUTES:-5}"

  # One-shot tools — not started by default; use `docker compose run`
  seed:
    <<: *service-defaults
    build:
      context: lol-pipeline-seed
      args:
        COMMON_VERSION: local
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-seed:/svc
    profiles: ["tools"]
    restart: "no"
    # entrypoint (not command) so `docker compose run seed <args>` passes args via $@
    entrypoint: ["sh", "-c", "pip install -q -e /common && pip install -q -e /svc && exec python -m lol_seed \"$@\"", "--"]

  admin:
    <<: *service-defaults
    build:
      context: lol-pipeline-admin
      args:
        COMMON_VERSION: local
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-admin:/svc
    profiles: ["tools"]
    restart: "no"
    # entrypoint (not command) so `docker compose run admin <args>` passes args via $@
    entrypoint: ["sh", "-c", "pip install -q -e /common && pip install -q -e /svc && exec python -m lol_admin \"$@\"", "--"]
