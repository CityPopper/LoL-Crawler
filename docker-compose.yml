x-service-defaults: &service-defaults
  env_file: .env
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  stop_grace_period: 30s
  mem_limit: 512m
  user: root  # Dev mode: seed/admin pip install at startup needs write access. Prod compose uses Dockerfile USER.
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"
  environment:
    PIP_ROOT_USER_ACTION: ignore
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    LOG_DIR: /logs
  depends_on:
    redis:
      condition: service_healthy

services:

  redis:
    image: redis:7-alpine
    restart: always
    mem_limit: 1g
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 800mb
      --maxmemory-policy noeviction
      --stop-writes-on-bgsave-error no
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ${REDIS_DATA_DIR:-./redis-data}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  crawler:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-crawler/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-crawler:/svc
      - ./logs:/logs
    command: ["python", "-m", "lol_crawler"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import asyncio,os,sys; from lol_pipeline.redis_client import get_redis,health_check; sys.exit(0 if asyncio.run(health_check(get_redis(os.environ.get('REDIS_URL','redis://redis:6379/0')))) else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  fetcher:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-fetcher/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-fetcher:/svc
      - ./lol-pipeline-fetcher/match-data:/match-data
      - ./logs:/logs
    command: ["python", "-m", "lol_fetcher"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import asyncio,os,sys; from lol_pipeline.redis_client import get_redis,health_check; sys.exit(0 if asyncio.run(health_check(get_redis(os.environ.get('REDIS_URL','redis://redis:6379/0')))) else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  parser:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-parser/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-parser:/svc
      - ./lol-pipeline-fetcher/match-data:/match-data:ro
      - ./logs:/logs
    command: ["python", "-m", "lol_parser"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import asyncio,os,sys; from lol_pipeline.redis_client import get_redis,health_check; sys.exit(0 if asyncio.run(health_check(get_redis(os.environ.get('REDIS_URL','redis://redis:6379/0')))) else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  analyzer:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-analyzer/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-analyzer:/svc
      - ./logs:/logs
    command: ["python", "-m", "lol_analyzer"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import asyncio,os,sys; from lol_pipeline.redis_client import get_redis,health_check; sys.exit(0 if asyncio.run(health_check(get_redis(os.environ.get('REDIS_URL','redis://redis:6379/0')))) else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  recovery:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-recovery/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-recovery:/svc
      - ./logs:/logs
    command: ["python", "-m", "lol_recovery"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import asyncio,os,sys; from lol_pipeline.redis_client import get_redis,health_check; sys.exit(0 if asyncio.run(health_check(get_redis(os.environ.get('REDIS_URL','redis://redis:6379/0')))) else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  delay-scheduler:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-delay-scheduler/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-delay-scheduler:/svc
      - ./logs:/logs
    command: ["python", "-m", "lol_delay_scheduler"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import asyncio,os,sys; from lol_pipeline.redis_client import get_redis,health_check; sys.exit(0 if asyncio.run(health_check(get_redis(os.environ.get('REDIS_URL','redis://redis:6379/0')))) else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  ui:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-ui/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-ui:/svc
      - ./logs:/logs
    ports:
      - "127.0.0.1:8080:8080"
    command: ["python", "-m", "lol_ui"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  discovery:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-discovery/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-discovery:/svc
      - ./logs:/logs
    command: ["python", "-m", "lol_discovery"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import asyncio,os,sys; from lol_pipeline.redis_client import get_redis,health_check; sys.exit(0 if asyncio.run(health_check(get_redis(os.environ.get('REDIS_URL','redis://redis:6379/0')))) else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  # One-shot tools — not started by default; use `docker compose run`
  seed:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-seed/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-seed:/svc
    profiles: ["tools"]
    restart: "no"
    # entrypoint (not command) so `docker compose run seed <args>` passes args via $@
    entrypoint: ["sh", "-c", "pip install -q -e /common && pip install -q -e /svc && exec python -m lol_seed \"$@\"", "--"]

  admin:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-admin/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-admin:/svc
    profiles: ["tools"]
    restart: "no"
    # entrypoint (not command) so `docker compose run admin <args>` passes args via $@
    entrypoint: ["sh", "-c", "pip install -q -e /common && pip install -q -e /svc && exec python -m lol_admin \"$@\"", "--"]
