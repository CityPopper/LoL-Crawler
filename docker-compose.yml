x-service-defaults: &service-defaults
  env_file: .env
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  stop_grace_period: 30s
  mem_limit: 512m
  user: root  # Dev mode: pip install at startup needs write access. Prod compose uses Dockerfile USER.
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"
  environment:
    PIP_ROOT_USER_ACTION: ignore
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    LOG_DIR: /logs
  depends_on:
    redis:
      condition: service_healthy

services:

  redis:
    image: redis:7-alpine
    restart: always
    mem_limit: 1g
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 800mb
      --maxmemory-policy noeviction
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ${REDIS_DATA_DIR:-./redis-data}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  crawler:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-crawler/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-crawler:/svc
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_crawler"

  fetcher:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-fetcher/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-fetcher:/svc
      - ./lol-pipeline-fetcher/match-data:/match-data
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_fetcher"

  parser:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-parser/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-parser:/svc
      - ./lol-pipeline-fetcher/match-data:/match-data:ro
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_parser"

  analyzer:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-analyzer/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-analyzer:/svc
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_analyzer"

  recovery:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-recovery/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-recovery:/svc
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_recovery"

  delay-scheduler:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-delay-scheduler/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-delay-scheduler:/svc
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_delay_scheduler"

  ui:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-ui/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-ui:/svc
      - ./logs:/logs
    ports:
      - "127.0.0.1:8080:8080"
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_ui"

  discovery:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-discovery/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-discovery:/svc
      - ./logs:/logs
    command: >
      sh -c "pip install -q -e /common && pip install -q -e /svc && python -m lol_discovery"

  # One-shot tools — not started by default; use `docker compose run`
  seed:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-seed/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-seed:/svc
    profiles: ["tools"]
    restart: "no"
    # entrypoint (not command) so `docker compose run seed <args>` passes args via $@
    entrypoint: ["sh", "-c", "pip install -q -e /common && pip install -q -e /svc && exec python -m lol_seed \"$@\"", "--"]

  admin:
    <<: *service-defaults
    build:
      context: .
      dockerfile: lol-pipeline-admin/Dockerfile
    volumes:
      - ./lol-pipeline-common:/common
      - ./lol-pipeline-admin:/svc
    profiles: ["tools"]
    restart: "no"
    # entrypoint (not command) so `docker compose run admin <args>` passes args via $@
    entrypoint: ["sh", "-c", "pip install -q -e /common && pip install -q -e /svc && exec python -m lol_admin \"$@\"", "--"]
